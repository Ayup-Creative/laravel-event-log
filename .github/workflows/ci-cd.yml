name: CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: write
  pull-requests: write

jobs:
  tests:
    name: PHPUnit tests
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '--no-change') }}
    strategy:
      matrix:
        php: [8.3, 8.4, 8.5]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, bcmath, pdo, sqlite
          coverage: xdebug

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Tests
        env:
          XDEBUG_MODE: coverage
        run: vendor/bin/phpunit --colors=never --coverage-text

  lint:
    name: Commit/PR lint
    needs: tests
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-please:
    name: Release Please
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          release-type: php
          token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-release-please:
    name: Cleanup release-please branch
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release-please')
    runs-on: ubuntu-latest

    steps:
      - name: Delete release-please branch
        run: |
          git push origin --delete "${{ github.event.pull_request.head.ref }}"
